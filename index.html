<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Equipamentos Esportivos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f8;
            color: #333;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #111;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        header p {
            color: #666;
            font-size: 1rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .img-container {
            width: 100%;
            height: 220px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #eee;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-title {
            font-size: 1.1rem;
            color: #222;
            font-weight: bold;
        }

        .card-price {
            font-size: 1.2rem;
            color: #2e7d32;
            font-weight: bold;
        }

        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-whatsapp:hover {
            background-color: #1ebe5d;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nossos Equipamentos</h1>
        <p>Escolha seu produto e faça o pedido direto pelo WhatsApp</p>
    </header>

    <div class="container">

        <!-- Produto 1: Alça de Pé Duplo -->
        <div class="card">
            <div class="img-container">
                <img src="alca-pe-duplo.jpg" alt="Alça de Pé Duplo">
            </div>
            <div class="card-content">
                <div class="card-title">Alça de Pé Duplo</div>
                <div class="card-price">R$ 55,00</div>
                <button class="btn-whatsapp" onclick="abrirCadastro('Alça de Pé Duplo', 'R$ 55,00')">Comprar via WhatsApp</button>
            </div>
        </div>

        <!-- Produto 2: Tira de Suspensão com Cabo -->
        <div class="card">
            <div class="img-container">
                <img src="tira-suspensao-cabo.jpg" alt="Tira de Suspensão com Cabo">
            </div>
            <div class="card-content">
                <div class="card-title">Tira de Suspensão com Cabo</div>
                <div class="card-price">R$ 145,00</div>
                <button class="btn-whatsapp" onclick="abrirCadastro('Tira de Suspensão com Cabo', 'R$ 145,00')">Comprar via WhatsApp</button>
            </div>
        </div>

        <!-- Produto 3: Superband Prime -->
        <div class="card">
            <div class="img-container">
                <img src="superband-prime.jpg" alt="Superband Prime">
            </div>
            <div class="card-content">
                <div class="card-title">Superband Prime</div>
                <div class="card-price">R$ 80,00</div>
                <button class="btn-whatsapp" onclick="abrirCadastro('Superband Prime', 'R$ 80,00')">Comprar via WhatsApp</button>
            </div>
        </div>

    </div>

    <script>
        function abrirCadastro(produto, preco) {
            // Substitua '55999999999' pelo seu número de WhatsApp com DDD
            const numeroWhatsApp = "55999999999"; 
            const mensagem = `Olá! Gostaria de comprar o produto: *${produto}* (${preco}). Como faço para prosseguir?`;
            const url = `https://api.whatsapp.com/send?phone=${numeroWhatsApp}&text=${encodeURIComponent(mensagem)}`;
            window.open(url, '_blank');
        }
    </script>

</body>
</html>
